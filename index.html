<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfume Hub</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

header {
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

nav {
    background:#222;
    padding:10px;
    text-align:center;
}

nav a {
    color:white;
    margin:10px;
    text-decoration:none;
}

.hero {
    text-align:center;
    padding:50px;
    background:#eee;
}

.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    width:220px;
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    border-radius:10px;
}

button {
    background:black;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
    border-radius:5px;
}

.cart {
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

footer {
    background:#000;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<header>
<h1>Perfume Hub</h1>
<p>Premium Non-Alcoholic Attar</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
<h2>Welcome to Perfume Hub</h2>
<p>Best Halal & Long Lasting Fragrances</p>
</div>

<div class="cart">
🛒 Items: <span id="count">0</span><br>
<button onclick="orderNow()">Order on WhatsApp</button>
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Oud Royal</h3>
<p>₹999</p>
<button onclick="add('Oud Royal - ₹999')">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Rose Attar</h3>
<p>₹799</p>
<button onclick="add('Rose Attar - ₹799')">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Musk Amber</h3>
<p>₹899</p>
<button onclick="add('Musk Amber - ₹899')">Add to Cart</button>
</div>

</div>

<footer>
<p>© 2026 Perfume Hub | All Rights Reserved</p>
</footer>

<script>
let cart = [];

function add(item){
    cart.push(item);
    document.getElementById("count").innerText = cart.length;
}

function orderNow(){
    if(cart.length === 0){
        alert("Cart empty hai!");
        return;
    }

    let message = "Assalamualaikum, I want to order:%0A";
    cart.forEach(i => message += "- " + i + "%0A");

    window.open("https://wa.me/91XXXXXXXXXX?text=" + message);
}
</script>

</body>
</html>
